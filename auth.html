<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign In / Sign Out Demo</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 2rem; }
    .container { max-width: 400px; margin: auto; padding: 2rem; border: 1px solid #ccc; border-radius: 8px; }
    input, button { width: 100%; padding: 0.5rem; margin: 0.5rem 0; }
    button { background-color: #007bff; color: white; border: none; cursor: pointer; }
    button:hover { background-color: #0056b3; }
    .error { color: red; }
    .success { color: green; }
    .hidden { display: none; }
  </style>
</head>
<body>
<div class="container" id="app">
  <h2 id="formTitle">Sign In</h2>
  <div id="errorMsg" class="error"></div>
  <div id="successMsg" class="success"></div>

  <!-- Sign In / Sign Up form -->
  <form id="authForm">
    <input type="email" id="email" placeholder="Email" required />
    <input type="password" id="password" placeholder="Password" required />
    <button type="submit" id="submitBtn">Sign In</button>
  </form>
  <p id="toggleText">
    Don't have an account? <a href="#" id="toggleLink">Sign Up</a>
  </p>

  <!-- Protected content (shown only when signed in) -->
  <div id="protectedZone" class="hidden">
    <h3>Welcome, <span id="userEmail"></span>!</h3>
    <p>This is protected content.</p>
    <button id="signOutBtn">Sign Out</button>
    <button id="fetchProtectedBtn">Fetch Protected Data</button>
    <pre id="protectedData"></pre>
  </div>
</div>

<script>
  const API_BASE = 'http://localhost:5000/api';
  let isSignUpMode = false;

  // DOM elements
  const formTitle = document.getElementById('formTitle');
  const submitBtn = document.getElementById('submitBtn');
  const toggleLink = document.getElementById('toggleLink');
  const toggleText = document.getElementById('toggleText');
  const authForm = document.getElementById('authForm');
  const protectedZone = document.getElementById('protectedZone');
  const userEmailSpan = document.getElementById('userEmail');
  const signOutBtn = document.getElementById('signOutBtn');
  const fetchProtectedBtn = document.getElementById('fetchProtectedBtn');
  const protectedDataPre = document.getElementById('protectedData');
  const errorMsgDiv = document.getElementById('errorMsg');
  const successMsgDiv = document.getElementById('successMsg');

  // Helper: show messages
  function showError(msg) { errorMsgDiv.innerText = msg; successMsgDiv.innerText = ''; setTimeout(() => errorMsgDiv.innerText = '', 3000); }
  function showSuccess(msg) { successMsgDiv.innerText = msg; errorMsgDiv.innerText = ''; setTimeout(() => successMsgDiv.innerText = '', 3000); }

  // Update UI based on sign in state
  function updateUI() {
    const token = localStorage.getItem('token');
    const userEmail = localStorage.getItem('userEmail');
    if (token && userEmail) {
      protectedZone.classList.remove('hidden');
      authForm.classList.add('hidden');
      toggleText.classList.add('hidden');
      userEmailSpan.innerText = userEmail;
    } else {
      protectedZone.classList.add('hidden');
      authForm.classList.remove('hidden');
      toggleText.classList.remove('hidden');
    }
  }

  // Sign out: remove token & user info
  function signOut() {
    localStorage.removeItem('token');
    localStorage.removeItem('userEmail');
    updateUI();
    showSuccess('Signed out successfully');
  }

  // Handle sign in / sign up submission
  authForm.addEventListener('submit', async (e) => {
    e.preventDefault();
    const email = document.getElementById('email').value;
    const password = document.getElementById('password').value;

    const endpoint = isSignUpMode ? '/auth/signup' : '/auth/signin';
    try {
      const res = await fetch(`${API_BASE}${endpoint}`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email, password })
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.message || 'Something went wrong');

      if (isSignUpMode) {
        showSuccess('Account created! Please sign in.');
        toggleMode(); // switch to sign in mode
        document.getElementById('password').value = '';
      } else {
        // Sign in success
        localStorage.setItem('token', data.token);
        localStorage.setItem('userEmail', data.user.email);
        updateUI();
        showSuccess('Signed in successfully');
      }
    } catch (err) {
      showError(err.message);
    }
  });

  // Toggle between Sign In and Sign Up
  function toggleMode() {
    isSignUpMode = !isSignUpMode;
    formTitle.innerText = isSignUpMode ? 'Sign Up' : 'Sign In';
    submitBtn.innerText = isSignUpMode ? 'Sign Up' : 'Sign In';
    toggleLink.innerText = isSignUpMode ? 'Sign In' : 'Sign Up';
    toggleText.innerHTML = isSignUpMode
      ? 'Already have an account? <a href="#" id="toggleLink">Sign In</a>'
      : 'Don\'t have an account? <a href="#" id="toggleLink">Sign Up</a>';
    // reattach event listener to the new toggle link
    const newToggleLink = document.getElementById('toggleLink');
    newToggleLink.addEventListener('click', (e) => { e.preventDefault(); toggleMode(); });
    errorMsgDiv.innerText = '';
    successMsgDiv.innerText = '';
  }

  toggleLink.addEventListener('click', (e) => { e.preventDefault(); toggleMode(); });

  // Fetch protected data (requires token)
  fetchProtectedBtn.addEventListener('click', async () => {
    const token = localStorage.getItem('token');
    if (!token) {
      showError('You are not signed in');
      return;
    }
    try {
      const res = await fetch(`${API_BASE}/protected`, {
        headers: { 'Authorization': `Bearer ${token}` }
      });
      if (!res.ok) {
        if (res.status === 403) signOut(); // token expired
        throw new Error('Failed to fetch protected data');
      }
      const data = await res.json();
      protectedDataPre.textContent = JSON.stringify(data, null, 2);
    } catch (err) {
      showError(err.message);
    }
  });

  signOutBtn.addEventListener('click', signOut);

  // Initial UI check
  updateUI();
</script>
</body>
</html>
